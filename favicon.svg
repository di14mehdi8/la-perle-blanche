<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <!-- Pearl radial gradient: bright highlight to warm gold edge -->
    <radialGradient id="pearl" cx="38%" cy="32%" r="65%" fx="38%" fy="32%">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="35%"  stop-color="#F5EFE6"/>
      <stop offset="70%"  stop-color="#D9C4A8"/>
      <stop offset="100%" stop-color="#B8976C"/>
    </radialGradient>
    <!-- Subtle outer glow -->
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#FAF8F5"/>
      <stop offset="100%" stop-color="#F0EAE0"/>
    </radialGradient>
  </defs>

  <!-- Warm pearl background circle -->
  <circle cx="16" cy="16" r="16" fill="url(#bg)"/>

  <!-- Pearl sphere -->
  <circle cx="16" cy="16" r="11" fill="url(#pearl)"/>

  <!-- Primary specular highlight -->
  <ellipse cx="12.5" cy="11.5" rx="3.2" ry="2.2"
           fill="white" opacity="0.55" transform="rotate(-20 12.5 11.5)"/>

  <!-- Secondary soft glow -->
  <ellipse cx="20" cy="20" rx="2" ry="1.2"
           fill="white" opacity="0.18" transform="rotate(-20 20 20)"/>
</svg>
